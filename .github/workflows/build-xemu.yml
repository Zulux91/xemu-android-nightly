# .github/workflows/build-xemu.yml
name: Build X1 BOX

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to compile'
        required: false
        default: 'master'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone izzy2lost/xemu
        run: |
          git clone --recurse-submodules --depth 1 \
            --branch ${{ github.event.inputs.ref }} \
            https://github.com/izzy2lost/xemu.git xemu

      - name: Get commit hash
        id: commit
        run: |
          HASH=$(git -C xemu rev-parse --short HEAD)
          MSG=$(git -C xemu log -1 --pretty=format:"%s")
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager \
            "ndk;29.0.14206865" \
            "cmake;3.30.3" \
            "build-tools;36.1.0" \
            "platforms;android-36"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build python3 python-is-python3 \
            rustup dos2unix
          rustup default stable
          rustup target add aarch64-linux-android

      - name: Cache native CMake build
        uses: actions/cache@v4
        with:
          path: xemu/android/app/.cxx
          key: cmake-arm64-${{ github.event.inputs.ref }}-${{ hashFiles('xemu/android/app/src/main/cpp/CMakeLists.txt', 'xemu/android/app/build.gradle.kts') }}
          restore-keys: cmake-arm64-${{ github.event.inputs.ref }}-

      - name: Fix gradle and CMake configuration for Linux
        run: |
          find xemu/android -type f \( -name "*.properties" -o -name "*.gradle" -o -name "*.kts" -o -name "gradlew" \) | xargs dos2unix
          sed -i '/org.gradle.java.home/d' xemu/android/gradle.properties
          sed -i "s/DEFAULT_JVM_OPTS='\".*\"'/DEFAULT_JVM_OPTS=''/" xemu/android/gradlew
          chmod +x xemu/android/gradlew
          sed -i 's|windows-x86_64|linux-x86_64|g' \
            xemu/android/app/src/main/cpp/CMakeLists.txt

      - name: Build Debug APK
        working-directory: xemu/android
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' xemu/android/app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: X1 BOX v${{ steps.version.outputs.name }}
          draft: false
          prerelease: false
          body: |
            Automatic build from [izzy2lost/xemu@${{ github.event.inputs.ref }}](https://github.com/izzy2lost/xemu/tree/${{ github.event.inputs.ref }})

            📌 Commit: [`${{ steps.commit.outputs.hash }}`](https://github.com/izzy2lost/xemu/commit/${{ steps.commit.outputs.hash }}) — ${{ steps.commit.outputs.msg }}

            ⚠️ APK signed with debug key. Only for testing.
          files: xemu/android/app/build/outputs/apk/debug/*.apk